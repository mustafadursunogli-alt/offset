const KEYS=["MIT9Z2HA", "DPFSJ2PE", "GDXE3VZU", "587FL10Z", "KXIAIQ8V"];
const USED=JSON.parse(localStorage.getItem('usedKeys')||'[]');

function doLogin(){
  const k=document.getElementById('keyInput').value.trim().toUpperCase();
  const err=document.getElementById('loginError');
  if(!k){err.textContent='Şifre girin.';return;}
  if(!KEYS.includes(k)){err.textContent='Geçersiz şifre.';return;}
  if(USED.includes(k)){err.textContent='Bu şifre daha önce kullanıldı.';return;}
  // İlk kullanımda kaydet
  USED.push(k);
  localStorage.setItem('usedKeys',JSON.stringify(USED));
  localStorage.setItem('activeKey',k);
  showApp();
}

function doLogout(){
  localStorage.removeItem('activeKey');
  document.getElementById('app').style.display='none';
  document.getElementById('loginScreen').style.display='flex';
}

window.onload=function(){
  const saved=localStorage.getItem('activeKey');
  if(saved&&KEYS.includes(saved)){showApp();}
};

document.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});

let mapInit=false,map,mu=null,mp=null,ml=null,wid=null;

function showApp(){
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('app').style.display='flex';
  if(!mapInit)initMap();
}

function initMap(){
  mapInit=true;
  map=L.map('map',{center:[39.23,34.93],zoom:9,zoomControl:true});
  L.tileLayer('https://{s}.google.com/vt/lyrs=s&x={x}&y={y}&z={z}',{maxZoom:21,subdomains:['mt0','mt1','mt2','mt3']}).addTo(map);
  KL.forEach(c=>{if(c.length>1)L.polyline(c.map(p=>[p[1],p[0]]),{color:'#ff8c42',weight:1.5,opacity:.6}).addTo(map)});
  KP.forEach(p=>{if(!p[2])return;L.marker([p[1],p[0]],{icon:L.divIcon({className:'',html:`<div class='pt-label'>${p[2]}</div>`,iconAnchor:[0,8]})}).addTo(map);});
  const al=A.map(c=>[c[1],c[0]]);
  const ap=L.polyline(al,{color:'#00d4ff',weight:3.5,opacity:.95}).addTo(map);
  map.fitBounds(ap.getBounds(),{padding:[20,20]});
  setTimeout(()=>map.invalidateSize(),100);
}

const cd=[0];
for(let i=1;i<A.length;i++){
  const dx=A[i][0]-A[i-1][0],dy=A[i][1]-A[i-1][1],mlat=(A[i][1]+A[i-1][1])/2*Math.PI/180;
  cd.push(cd[i-1]+Math.sqrt((dx*111320*Math.cos(mlat))**2+(dy*111320)**2));
}

function fc(lat,lon){
  let md=Infinity,si=0,bt=0,cx=0,cy=0;
  for(let i=0;i<A.length-1;i++){
    const ax=A[i][0],ay=A[i][1],bx=A[i+1][0],by=A[i+1][1],dx=bx-ax,dy=by-ay,lq=dx*dx+dy*dy;
    let t=lq>0?((lon-ax)*dx+(lat-ay)*dy)/lq:0;t=Math.max(0,Math.min(1,t));
    const px=ax+t*dx,py=ay+t*dy,mlat=lat*Math.PI/180;
    const d=Math.sqrt(((lon-px)*111320*Math.cos(mlat))**2+((lat-py)*111320)**2);
    if(d<md){md=d;si=i;bt=t;cx=px;cy=py;}
  }
  const cross=(A[si+1][0]-A[si][0])*(lat-A[si][1])-(A[si+1][1]-A[si][1])*(lon-A[si][0]);
  return{d:md,s:cross>0?'SOL':'SAĞ',px:cx,py:cy,km:cd[si]+bt*(cd[si+1]-cd[si])};
}

const iu=L.divIcon({className:'',html:'<div class=du></div>',iconSize:[14,14],iconAnchor:[7,7]});
const ip=L.divIcon({className:'',html:'<div class=dp></div>',iconSize:[8,8],iconAnchor:[4,4]});

function tog(){
  const b=document.getElementById('btn');
  if(wid!==null){navigator.geolocation.clearWatch(wid);wid=null;b.textContent='▶ Başlat';b.className='';return;}
  b.textContent='⏸ Durdur';b.className='stop';
  wid=navigator.geolocation.watchPosition(onP,onE,{enableHighAccuracy:true,maximumAge:1500,timeout:20000});
}

function onP(p){
  const lat=p.coords.latitude,lon=p.coords.longitude,acc=Math.round(p.coords.accuracy);
  if(!mu)mu=L.marker([lat,lon],{icon:iu,zIndexOffset:1000}).addTo(map);else mu.setLatLng([lat,lon]);
  const r=fc(lat,lon);
  if(!mp)mp=L.marker([r.py,r.px],{icon:ip,zIndexOffset:900}).addTo(map);else mp.setLatLng([r.py,r.px]);
  if(ml)map.removeLayer(ml);
  const col=r.s==='SOL'?'#f85149':'#3fb950';
  ml=L.polyline([[lat,lon],[r.py,r.px]],{color:col,weight:2,dashArray:'6,4'}).addTo(map);
  document.getElementById('vO').textContent=Math.round(r.d);
  document.getElementById('vD').textContent=r.s;
  document.getElementById('cD').className='card '+(r.s==='SOL'?'cl':'cr');
  document.getElementById('vK').textContent=(r.km/1000).toFixed(3);
  document.getElementById('vA').textContent=acc;
  document.getElementById('st').textContent=Math.round(r.d)+'m '+r.s+' KM:'+(r.km/1000).toFixed(2);
  map.panTo([lat,lon],{animate:true,duration:.4});
}

function onE(e){
  const m={1:'İzin reddedildi.',2:'Konum yok.',3:'Zaman aşımı.'};
  document.getElementById('st').textContent=m[e.code]||e.message;
  document.getElementById('btn').textContent='▶ Başlat';
  document.getElementById('btn').className='';wid=null;
}
