function findSection(km){
  const keys=Object.keys(SECTIONS).map(Number).sort((a,b)=>a-b);
  let best=null,bestDiff=999;
  for(const k of keys){const d=Math.abs(k-km);if(d<bestDiff){bestDiff=d;best=k;}}
  return bestDiff<0.3?SECTIONS[String(best)]:null;
}

function showKesit(km){
  const profile=findSection(km);
  if(!profile)return;
  document.getElementById('kesitPanel').style.display='flex';
  document.getElementById('kesitInfo').textContent='KM: '+km.toFixed(3);
  const axisZ=profile.find(p=>p[0]===0)?profile.find(p=>p[0]===0)[1]:profile[Math.floor(profile.length/2)][1];
  setTimeout(()=>drawKesit(profile,axisZ),50);
  map.invalidateSize();
}

function closeKesit(){
  document.getElementById('kesitPanel').style.display='none';
  map.invalidateSize();
}

function drawKesit(profile,axisZ){
  const canvas=document.getElementById('kesitCanvas');
  const W=canvas.parentElement.clientWidth||window.innerWidth;
  const H=280;canvas.width=W*2;canvas.height=H*2;
  canvas.style.width=W+'px';canvas.style.height=H+'px';
  const ctx=canvas.getContext('2d');
  ctx.scale(2,2);
  ctx.fillStyle='#0d1117';ctx.fillRect(0,0,W,H);
  if(!profile||profile.length<2)return;

  // Tip kesit olculeri (metre)
  const SUBBALAST=0.30;
  const ALTTEMEL=0.35;       // ortalama
  const RAY_ARASI=1.45;      // iki hat arasi
  const HAT_ARASI=4.50;      // hat eksenleri arasi (3+1.5)
  const PLATFORM_W=7.25;     // yarim platform genisligi (her taraf)
  const BAKIM_YOLU=4.00;     // bakim yolu genisligi
  const BAKIM_OFF=1.00;      // bakim yolu offset
  const SEV=2.0;             // 2/1 (yatay/dikey)
  const PALYE_H=5.0;         // palye yuksekligi
  const TEL_CIT=0.50;        // tel cit mesafesi

  const xs=profile.map(p=>p[0]),zs=profile.map(p=>p[1]);
  const ariziZ=profile.find(p=>p[0]===0)?profile.find(p=>p[0]===0)[1]:profile[Math.floor(profile.length/2)][1];
  const isYarma=(ariziZ>axisZ+0.3);
  const kazikotu=axisZ-ALTTEMEL-SUBBALAST;
  const platTop=axisZ+SUBBALAST;

  // Viewport
  const xRange=Math.max(80,Math.abs(Math.min(...xs))+5,Math.abs(Math.max(...xs))+5);
  const zRange=Math.max(...zs,platTop+20)-Math.min(...zs,kazikotu-3);
  const xmin=-xRange,xmax=xRange;
  const zmin=Math.min(...zs,kazikotu)-3;
  const zmax=Math.max(...zs,platTop)+Math.min(20,zRange*0.3)+3;

  const pad={l:45,r:15,t:20,b:35};
  const cw=W-pad.l-pad.r,ch=H-pad.t-pad.b;
  function tx(x){return pad.l+(x-xmin)/(xmax-xmin)*cw;}
  function tz(z){return pad.t+ch-(z-zmin)/(zmax-zmin)*ch;}

  // Grid
  ctx.strokeStyle='#1a2a1a';ctx.lineWidth=0.3;
  const zstep=zRange>30?10:5;
  for(let z=Math.ceil(zmin/zstep)*zstep;z<=zmax;z+=zstep){
    ctx.beginPath();ctx.moveTo(pad.l,tz(z));ctx.lineTo(pad.l+cw,tz(z));ctx.stroke();
    ctx.fillStyle='#6b7280';ctx.font='8px sans-serif';ctx.textAlign='right';
    ctx.fillText(z.toFixed(0),pad.l-2,tz(z)+3);
  }
  for(let x=-80;x<=80;x+=20){
    ctx.beginPath();ctx.moveTo(tx(x),pad.t);ctx.lineTo(tx(x),pad.t+ch);ctx.stroke();
    ctx.fillStyle='#6b7280';ctx.font='8px sans-serif';ctx.textAlign='center';
    ctx.fillText((x>=0?'+':'')+x,tx(x),H-5);
  }

  // Tabi zemin - dolu alan
  ctx.beginPath();
  ctx.moveTo(tx(xmin),tz(zmin));
  for(let i=0;i<profile.length;i++) ctx.lineTo(tx(profile[i][0]),tz(profile[i][1]));
  ctx.lineTo(tx(xmax),tz(zmin));ctx.closePath();
  ctx.fillStyle='rgba(101,67,33,0.55)';ctx.fill();
  // Arazi cizgisi
  ctx.beginPath();ctx.strokeStyle='#d4a017';ctx.lineWidth=1.5;
  for(let i=0;i<profile.length;i++){
    const px=tx(profile[i][0]),pz=tz(profile[i][1]);
    i===0?ctx.moveTo(px,pz):ctx.lineTo(px,pz);
  }
  ctx.stroke();

  // === TIP KESIT CIZIMI ===
  // Platform genisligi: iki hat + bakÄ±m yollarÄ±
  // Sol hat ekseni: -HAT_ARASI/2, Sag hat ekseni: +HAT_ARASI/2
  const hatL=-HAT_ARASI/2;
  const hatR=+HAT_ARASI/2;
  const platL=-(PLATFORM_W);
  const platR=+(PLATFORM_W);

  // KazÄ±/dolgu tabanÄ±
  const sevBasL=platL-BAKIM_OFF-BAKIM_YOLU;
  const sevBasR=platR+BAKIM_OFF+BAKIM_YOLU;

  // Subbalast yÃ¼zeyi
  const sbZ=axisZ+SUBBALAST;
  // Platform yÃ¼zey kotu
  const platZ=sbZ;

  // Alttemel tabanÄ±
  const atZ=axisZ-ALTTEMEL;

  // DOLGU veya YARMA sevi
  function cizSev(ctx,tx,tz,startX,startZ,yon,isYarma,ariziZ,platZ){
    // yon: +1 sag, -1 sol
    ctx.beginPath();
    ctx.moveTo(tx(startX),tz(startZ));
    let prevX=startX,prevZ=startZ;
    let palyeSayisi=0;
    for(let d=0;d<=80;d+=0.2){
      let x=startX+yon*d;
      let z;
      if(isYarma){
        z=startZ+d*0.5; // 2/1 -> her 2m yatayda 1m yukari
        // Palye kontrolu
        if(d>0&&Math.floor(d/PALYE_H)>palyeSayisi){
          palyeSayisi++;
          // Palye ciz - yatay 0.5m
          ctx.lineTo(tx(x),tz(z));
          ctx.lineTo(tx(x+yon*0.5),tz(z));
          prevX=x+yon*0.5;prevZ=z;
        }
      }else{
        z=startZ-d*0.5; // dolgu: asagi iner
      }
      ctx.lineTo(tx(x),tz(z));
      if(isYarma&&z>=ariziZ+1)break;
      if(!isYarma&&z<=ariziZ-0.5)break;
    }
    ctx.stroke();
  }

  // Platform ust yÃ¼zeyi (subbalast ustu)
  ctx.fillStyle='rgba(180,180,180,0.15)';
  ctx.strokeStyle='#9ca3af';ctx.lineWidth=0.8;
  ctx.beginPath();
  ctx.moveTo(tx(platL),tz(platZ));
  ctx.lineTo(tx(platR),tz(platZ));
  ctx.lineTo(tx(platR),tz(atZ));
  ctx.lineTo(tx(platL),tz(atZ));
  ctx.closePath();
  ctx.fill();ctx.stroke();

  // Subbalast katmani (gri)
  ctx.fillStyle='rgba(150,150,150,0.4)';
  ctx.beginPath();
  ctx.moveTo(tx(platL),tz(platZ));
  ctx.lineTo(tx(platR),tz(platZ));
  ctx.lineTo(tx(platR),tz(axisZ));
  ctx.lineTo(tx(platL),tz(axisZ));
  ctx.closePath();ctx.fill();
  ctx.strokeStyle='#9ca3af';ctx.lineWidth=0.5;ctx.stroke();

  // Alttemel katmani (acik kahve)
  ctx.fillStyle='rgba(180,140,80,0.4)';
  ctx.beginPath();
  ctx.moveTo(tx(platL),tz(axisZ));
  ctx.lineTo(tx(platR),tz(axisZ));
  ctx.lineTo(tx(platR),tz(atZ));
  ctx.lineTo(tx(platL),tz(atZ));
  ctx.closePath();ctx.fill();

  // Bakim yollari
  for(const side of [-1,1]){
    const bx1=side>0?platR:platL-BAKIM_YOLU;
    const bx2=side>0?platR+BAKIM_YOLU:platL;
    ctx.fillStyle='rgba(100,80,40,0.3)';
    ctx.strokeStyle='#78716c';ctx.lineWidth=0.5;
    ctx.beginPath();
    ctx.moveTo(tx(bx1),tz(platZ));ctx.lineTo(tx(bx2),tz(platZ));
    ctx.lineTo(tx(bx2),tz(atZ));ctx.lineTo(tx(bx1),tz(atZ));
    ctx.closePath();ctx.fill();ctx.stroke();
  }

  // Sevler
  ctx.lineWidth=1.5;
  if(isYarma){
    ctx.strokeStyle='#60a5fa';
    cizSev(ctx,tx,tz,platL+BAKIM_YOLU*(-1),platZ,-1,true,ariziZ,platZ);
    cizSev(ctx,tx,tz,platR+BAKIM_YOLU,platZ,1,true,ariziZ,platZ);
  }else{
    ctx.strokeStyle='#fb923c';
    cizSev(ctx,tx,tz,platL-BAKIM_YOLU,platZ,-1,false,ariziZ,platZ);
    cizSev(ctx,tx,tz,platR+BAKIM_YOLU,platZ,1,false,ariziZ,platZ);
  }

  // Raylar - sol hat
  for(const rx of [hatL-0.725,hatL+0.725,hatR-0.725,hatR+0.725]){
    ctx.fillStyle='#6b7280';
    ctx.fillRect(tx(rx)-1,tz(platZ)-8,2,8);
    ctx.fillStyle='#374151';
    ctx.fillRect(tx(rx)-3,tz(platZ)-2,6,3);
  }

  // Traversler (sembolik)
  for(const hx of [hatL,hatR]){
    ctx.fillStyle='rgba(80,80,80,0.6)';
    ctx.fillRect(tx(hx)-1.2,tz(platZ)-0.5,2.4,(tz(axisZ)-tz(platZ))*0.6);
  }

  // Eksen cizgisi
  ctx.strokeStyle='#ef4444';ctx.lineWidth=1;ctx.setLineDash([4,3]);
  ctx.beginPath();ctx.moveTo(tx(0),pad.t);ctx.lineTo(tx(0),pad.t+ch);ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle='#ef4444';ctx.font='bold 8px sans-serif';ctx.textAlign='center';
  ctx.fillText('CL',tx(0),pad.t+8);

  // Sol/sag hat eksenleri
  for(const hx of [hatL,hatR]){
    ctx.strokeStyle='rgba(239,68,68,0.4)';ctx.lineWidth=0.5;ctx.setLineDash([2,4]);
    ctx.beginPath();ctx.moveTo(tx(hx),pad.t);ctx.lineTo(tx(hx),pad.t+ch);ctx.stroke();
    ctx.setLineDash([]);
  }

  // Yazi etiketleri
  ctx.font='bold 9px sans-serif';ctx.textAlign='center';
  const tip=isYarma?'YARMA':'DOLGU';
  const tipColor=isYarma?'#60a5fa':'#fb923c';
  ctx.fillStyle=tipColor;
  ctx.fillText(tip,tx(0),pad.t+18);

  ctx.fillStyle='#9ca3af';ctx.font='8px sans-serif';
  ctx.fillText('SUBBALAST',tx(0),tz(axisZ+SUBBALAST/2)+3);
  ctx.fillText('ALTTEMEL',tx(platR+BAKIM_YOLU/2+2),tz(axisZ-ALTTEMEL/2)+3);

  // Boyutlar - platform genisligi
  ctx.strokeStyle='#4b5563';ctx.lineWidth=0.5;
  ctx.beginPath();ctx.moveTo(tx(platL),tz(zmin+1));ctx.lineTo(tx(platR),tz(zmin+1));ctx.stroke();
  ctx.fillStyle='#6b7280';ctx.font='8px sans-serif';ctx.textAlign='center';
  ctx.fillText((platR*2).toFixed(1)+'m',tx(0),tz(zmin+1)-2);

  // Kot etiketi
  ctx.fillStyle='#fbbf24';ctx.font='8px sans-serif';ctx.textAlign='left';
  ctx.fillText('Arazi: '+ariziZ.toFixed(2)+'m',pad.l+3,pad.t+H-pad.t-pad.b-5);
  ctx.fillStyle='#34d399';
  ctx.fillText('Eksen: '+axisZ.toFixed(2)+'m',pad.l+3,pad.t+H-pad.t-pad.b+5);
}

function fc(lat,lon){let md=Infinity,si=0,bt=0,cx=0,cy=0;for(let i=0;i<A.length-1;i++){const ax=A[i][0],ay=A[i][1],bx=A[i+1][0],by=A[i+1][1],dx=bx-ax,dy=by-ay,lq=dx*dx+dy*dy;let t=lq>0?((lon-ax)*dx+(lat-ay)*dy)/lq:0;t=Math.max(0,Math.min(1,t));const px=ax+t*dx,py=ay+t*dy;const mlat=lat*Math.PI/180;const ddx=(lon-px)*111320*Math.cos(mlat),ddy=(lat-py)*111320,d=Math.sqrt(ddx*ddx+ddy*ddy);if(d<md){md=d;si=i;bt=t;cx=px;cy=py;}}const ax=A[si][0],ay=A[si][1],bx=A[si+1][0],by=A[si+1][1];const cross=(bx-ax)*(lat-ay)-(by-ay)*(lon-ax);const km=cd[si]+bt*(cd[si+1]-cd[si]);return{d:md,s:cross>0?'SOL':'SAG',px:cx,py:cy,km};}const iu=L.divIcon({className:'',html:'<div class=du></div>',iconSize:[14,14],iconAnchor:[7,7]});const ip=L.divIcon({className:'',html:'<div class=dp></div>',iconSize:[8,8],iconAnchor:[4,4]});let mu=null,mp=null,ml=null,wid=null;function tog(){const b=document.getElementById('btn');if(wid!==null){navigator.geolocation.clearWatch(wid);wid=null;b.textContent='Baslat';b.className='';return;}b.textContent='Durdur';b.className='stop';wid=navigator.geolocation.watchPosition(onP,onE,{enableHighAccuracy:true,maximumAge:1500,timeout:20000});}function onP(p){const lat=p.coords.latitude,lon=p.coords.longitude,acc=Math.round(p.coords.accuracy);if(!mu)mu=L.marker([lat,lon],{icon:iu,zIndexOffset:1000}).addTo(map);else mu.setLatLng([lat,lon]);const r=fc(lat,lon);if(!mp)mp=L.marker([r.py,r.px],{icon:ip,zIndexOffset:900}).addTo(map);else mp.setLatLng([r.py,r.px]);if(ml)map.removeLayer(ml);const col=r.s==='SOL'?'#f85149':'#3fb950';ml=L.polyline([[lat,lon],[r.py,r.px]],{color:col,weight:2,dashArray:'6,4'}).addTo(map);document.getElementById('vO').textContent=Math.round(r.d);const cd2=document.getElementById('cD');document.getElementById('vD').textContent=r.s;cd2.className='card '+(r.s==='SOL'?'cl':'cr');document.getElementById('vK').textContent=(r.km/1000).toFixed(3);document.getElementById('vA').textContent=acc;document.getElementById('st').textContent='Offset:'+Math.round(r.d)+'m '+r.s+' KM:'+(r.km/1000).toFixed(2);if(document.getElementById("kesitPanel").style.display==="none")map.panTo([lat,lon],{animate:true,duration:.4});}function onE(e){const m={1:'Izin reddedildi.',2:'Konum yok.',3:'Zaman asimi.'};document.getElementById('st').textContent=m[e.code]||e.message;document.getElementById('btn').textContent='Baslat';document.getElementById('btn').className='';wid=null;}
